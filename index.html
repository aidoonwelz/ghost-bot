<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GHOST — Terminal</title>
<script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root{
    --bg:#080a0f; --panel:#0c0f16; --panel2:#0a0d13; --edge:#1b2130; --edge2:#141926;
    --ink:#e2e8f2; --ink2:#aab4c6; --mute:#67707f;
    --up:#26d07c; --down:#f6465d; --amber:#e0a417;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--bg); }
  body{ color:var(--ink); font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        -webkit-font-smoothing:antialiased; max-width:1000px; margin:0 auto; padding:0 14px 40px; }
  .mono{ font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-variant-numeric:tabular-nums; letter-spacing:-.01em; }
  .lbl{ font-size:9.5px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--mute); }
  .up{ color:var(--up);} .down{ color:var(--down);}

  /* ---- TICKER STRIP ---- */
  .ticker{ display:flex; gap:0; overflow-x:auto; border-bottom:1px solid var(--edge);
           margin:0 -14px 0; padding:0 14px; scrollbar-width:none; }
  .ticker::-webkit-scrollbar{ display:none; }
  .tk{ display:flex; align-items:baseline; gap:7px; padding:9px 16px 9px 0; margin-right:16px; white-space:nowrap;
       border-right:1px solid var(--edge2); }
  .tk:last-child{ border-right:0; }
  .tk .s{ font-size:11px; font-weight:700; letter-spacing:.04em; color:var(--ink2); }
  .tk .p{ font-size:12px; } .tk .c{ font-size:10.5px; font-weight:600; }

  /* ---- HEADER ---- */
  header{ display:flex; align-items:center; justify-content:space-between; padding:16px 2px 14px; flex-wrap:wrap; gap:10px; }
  .wm{ font-weight:800; font-size:17px; letter-spacing:.22em; }
  .wm span{ font-weight:500; letter-spacing:.08em; font-size:10px; color:var(--mute); margin-left:8px; }
  .acct{ display:flex; align-items:baseline; gap:14px; }
  .acct .eq{ font-size:26px; font-weight:700; }
  .acct .chg{ font-size:13px; font-weight:700; }
  .live{ display:inline-flex; align-items:center; gap:6px; font-size:9.5px; font-weight:700; letter-spacing:.14em; color:var(--up); }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--up); box-shadow:0 0 8px var(--up); animation:blink 1.7s infinite; }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ---- CHART PANEL ---- */
  .panel{ border:1px solid var(--edge); border-radius:8px; background:var(--panel); overflow:hidden; }
  .ptop{ display:flex; align-items:center; justify-content:space-between; padding:9px 11px; border-bottom:1px solid var(--edge2); gap:8px; flex-wrap:wrap; }
  .seg{ display:inline-flex; border:1px solid var(--edge); border-radius:6px; overflow:hidden; }
  .seg .b{ font-size:11px; font-weight:600; color:var(--mute); padding:5px 10px; cursor:pointer; background:transparent;
           border-right:1px solid var(--edge2); transition:.12s; }
  .seg .b:last-child{ border-right:0; }
  .seg .b:hover{ color:var(--ink2); }
  .seg .b.on{ color:var(--ink); background:#151b28; }
  .legend{ font-size:11px; color:var(--mute); padding:8px 11px; border-bottom:1px solid var(--edge2); display:flex; gap:14px; flex-wrap:wrap; min-height:33px; align-items:center; }
  .legend b{ color:var(--ink); font-weight:600; }
  #chart{ width:100%; height:400px; }
  @media(max-width:560px){ #chart{ height:310px; } .acct .eq{ font-size:22px; } }

  /* ---- STATUS BAR ---- */
  .statusbar{ display:grid; grid-template-columns:repeat(6,1fr); border:1px solid var(--edge); border-top:0;
              border-radius:0 0 8px 8px; margin-bottom:22px; }
  @media(max-width:620px){ .statusbar{ grid-template-columns:repeat(3,1fr); } }
  .cell{ padding:11px 13px; border-right:1px solid var(--edge2); }
  .cell:nth-child(6n),.cell:last-child{ border-right:0; }
  @media(max-width:620px){ .cell{ border-top:1px solid var(--edge2); } .cell:nth-child(3n){ border-right:0; } }
  .cell .v{ font-size:16px; font-weight:700; margin-top:5px; }

  /* ---- POSITIONS TABLE ---- */
  .thead,.trow{ display:grid; grid-template-columns:1.3fr 1fr 1.4fr .7fr; align-items:center; gap:10px; padding:11px 14px; }
  .thead{ border-bottom:1px solid var(--edge); }
  .thead div{ font-size:9.5px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--mute); }
  .thead .r,.trow .r{ text-align:right; }
  .book{ border:1px solid var(--edge); border-radius:8px; overflow:hidden; }
  .trow{ border-bottom:1px solid var(--edge2); border-left:2px solid transparent; }
  .trow:last-child{ border-bottom:0; }
  .trow.long{ border-left-color:var(--up); }
  .trow .sym{ font-weight:700; font-size:14px; }
  .trow .sub{ font-size:10px; color:var(--mute); margin-top:2px; }
  .trow .st{ font-size:10px; font-weight:700; letter-spacing:.08em; text-align:right; }
  .st.on{ color:var(--up); } .st.off{ color:var(--mute); }
  .foot{ color:var(--mute); font-size:10px; margin:16px 2px; letter-spacing:.02em; }
</style>
</head>
<body>
  <div class="ticker" id="ticker"></div>

  <header>
    <div class="wm">GHOST<span>EMA 9×21 · paper</span></div>
    <div class="acct">
      <div><span class="lbl">Equity</span></div>
      <div class="eq mono" id="eq">—</div>
      <div class="chg mono" id="ret"></div>
      <div class="live"><span class="dot"></span>LIVE</div>
    </div>
  </header>

  <div class="panel">
    <div class="ptop">
      <div class="seg" id="assetTabs"></div>
      <div class="seg" id="tfTabs"></div>
    </div>
    <div class="legend" id="legend">loading…</div>
    <div id="chart"></div>
  </div>
  <div class="statusbar" id="stats"></div>

  <div class="thead"><div>Symbol</div><div class="r">Price</div><div class="r">Unrealized P&amp;L</div><div class="r">Status</div></div>
  <div class="book" id="book"></div>
  <div class="foot mono" id="foot"></div>

<script>
const ASSETS=["BTC-USD","ETH-USD","SOL-USD","XRP-USD","DOGE-USD","LINK-USD"];
const TF={"15m":900,"1H":3600,"6H":21600,"1D":86400};
const money=n=>"$"+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const fx=n=>Number(n).toLocaleString(undefined,{minimumFractionDigits:n<1?4:2,maximumFractionDigits:n<1?4:2});
const short=a=>a.replace("-USD","");
let PF=null, PRICES={}, CHG={}, asset="BTC-USD", tf="1H";

/* ===== CHART ===== */
const LWC=window.LightweightCharts;
const chart=LWC.createChart(document.getElementById("chart"),{
  layout:{ background:{type:'solid',color:'transparent'}, textColor:'#67707f', fontFamily:'ui-monospace,monospace', fontSize:11 },
  grid:{ vertLines:{color:'#111621'}, horzLines:{color:'#111621'} },
  rightPriceScale:{ borderColor:'#1b2130' },
  timeScale:{ borderColor:'#1b2130', timeVisible:true, secondsVisible:false },
  crosshair:{ mode:LWC.CrosshairMode.Normal, vertLine:{color:'#38445c',labelBackgroundColor:'#151b28'}, horzLine:{color:'#38445c',labelBackgroundColor:'#151b28'} },
});
const candle=chart.addCandlestickSeries({ upColor:'#26d07c',downColor:'#f6465d',borderVisible:false,wickUpColor:'#26d07c',wickDownColor:'#f6465d' });
const e9=chart.addLineSeries({ color:'#4c7fff', lineWidth:1, priceLineVisible:false, lastValueVisible:false });
const e21=chart.addLineSeries({ color:'#e0a417', lineWidth:1, priceLineVisible:false, lastValueVisible:false });
const vol=chart.addHistogramSeries({ priceScaleId:'vol', priceLineVisible:false, lastValueVisible:false });
chart.priceScale('vol').applyOptions({ scaleMargins:{top:0.85,bottom:0} });
new ResizeObserver(()=>chart.applyOptions({width:document.getElementById("chart").clientWidth})).observe(document.getElementById("chart"));
let entryLines=[];
function ema(v,n){ const k=2/(n+1); let e=v[0]; return v.map((x,i)=>{ e=i?x*k+e*(1-k):x; return e; }); }

async function loadChart(){
  document.getElementById("legend").textContent="loading "+short(asset)+" · "+tf+"…";
  try{
    const r=await fetch(`https://api.exchange.coinbase.com/products/${asset}/candles?granularity=${TF[tf]}`,{cache:"no-store"});
    let raw=await r.json(); raw.sort((a,b)=>a[0]-b[0]);
    const bars=raw.map(c=>({time:c[0],open:c[3],high:c[2],low:c[1],close:c[4],volume:c[5]}));
    candle.setData(bars.map(b=>({time:b.time,open:b.open,high:b.high,low:b.low,close:b.close})));
    vol.setData(bars.map(b=>({time:b.time,value:b.volume,color:b.close>=b.open?'rgba(38,208,124,.3)':'rgba(246,70,93,.3)'})));
    const c=bars.map(b=>b.close), a9=ema(c,9), a21=ema(c,21);
    e9.setData(bars.map((b,i)=>({time:b.time,value:a9[i]})));
    e21.setData(bars.map((b,i)=>({time:b.time,value:a21[i]})));
    entryLines.forEach(l=>candle.removePriceLine(l)); entryLines=[];
    if(PF && PF.pos[asset] && PF.pos[asset].units>0){ const p=PF.pos[asset];
      entryLines.push(candle.createPriceLine({price:p.entry,color:'#26d07c',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'entry'}));
      entryLines.push(candle.createPriceLine({price:p.liq,color:'#f6465d',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'liq'})); }
    chart.timeScale().fitContent();
    setLegend(bars[bars.length-1],a9[a9.length-1],a21[a21.length-1]);
  }catch(e){ document.getElementById("legend").innerHTML='price feed blocked by browser — refresh'; }
}
function setLegend(b,v9,v21){ if(!b) return; const up=b.close>=b.open;
  document.getElementById("legend").innerHTML=
    `<span style="color:var(--ink2)"><b>${short(asset)}</b> · ${tf}</span>`+
    `<span>O <b>${fx(b.open)}</b></span><span>H <b>${fx(b.high)}</b></span><span>L <b>${fx(b.low)}</b></span>`+
    `<span class="${up?'up':'down'}">C <b>${fx(b.close)}</b></span>`+
    `<span style="color:#4c7fff">EMA9 ${fx(v9)}</span><span style="color:#e0a417">EMA21 ${fx(v21)}</span>`; }
chart.subscribeCrosshairMove(p=>{ if(!p.time||!p.seriesData) return;
  const c=p.seriesData.get(candle),a=p.seriesData.get(e9),b=p.seriesData.get(e21);
  if(c) setLegend({open:c.open,high:c.high,low:c.low,close:c.close}, a?a.value:0, b?b.value:0); });

/* ===== TABS ===== */
function buildTabs(){
  document.getElementById("assetTabs").innerHTML=ASSETS.map(a=>`<button class="b ${a===asset?'on':''}" data-a="${a}">${short(a)}</button>`).join("");
  document.getElementById("tfTabs").innerHTML=Object.keys(TF).map(t=>`<button class="b ${t===tf?'on':''}" data-t="${t}">${t}</button>`).join("");
  document.querySelectorAll("[data-a]").forEach(el=>el.onclick=()=>{asset=el.dataset.a;buildTabs();loadChart();});
  document.querySelectorAll("[data-t]").forEach(el=>el.onclick=()=>{tf=el.dataset.t;buildTabs();loadChart();});
}

/* ===== LIVE DATA (Coinbase /stats gives last + 24h open) ===== */
async function livePrices(){ await Promise.all(ASSETS.map(async a=>{ try{
  const ctl=new AbortController(); const t=setTimeout(()=>ctl.abort(),5000);
  const r=await fetch(`https://api.exchange.coinbase.com/products/${a}/stats`,{cache:"no-store",signal:ctl.signal}); clearTimeout(t);
  if(r.ok){ const s=await r.json(); PRICES[a]=parseFloat(s.last); CHG[a]=(parseFloat(s.last)/parseFloat(s.open)-1)*100; }
}catch(e){} })); }

function valueOf(a,p){ const live=PRICES[a];
  if(p.units>0){ const pr=live??p.entry; return {val:Math.max(0,p.margin+p.units*(pr-p.entry)),price:pr}; }
  return {val:p.cash,price:live??null}; }

function renderTicker(){
  document.getElementById("ticker").innerHTML=ASSETS.map(a=>{ const pr=PRICES[a],ch=CHG[a];
    const cls=ch>=0?'up':'down';
    return `<div class="tk"><span class="s">${short(a)}</span><span class="p mono">${pr?fx(pr):'—'}</span>`+
      `<span class="c mono ${cls}">${ch!=null?((ch>=0?'+':'')+ch.toFixed(2)+'%'):''}</span></div>`; }).join("");
}

function renderPortfolio(){
  renderTicker();
  if(!PF) return;
  let eq=0; Object.entries(PF.pos).forEach(([a,p])=>eq+=valueOf(a,p).val);
  const ret=(eq/PF.start-1)*100, up=ret>=0, open=Object.values(PF.pos).filter(p=>p.units>0).length;
  document.getElementById("eq").textContent=money(eq);
  document.getElementById("ret").innerHTML=`<span class="${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(ret).toFixed(2)}%</span>`;
  const cell=(k,v,cls="")=>`<div class="cell"><span class="lbl">${k}</span><div class="v mono ${cls}">${v}</div></div>`;
  document.getElementById("stats").innerHTML=
    cell("Return",ret.toFixed(1)+"%",up?'up':'down')+
    cell("Realized",money(PF.realized||0),(PF.realized||0)>=0?'up':'down')+
    cell("Open",open)+cell("Trades",PF.trades||0)+
    cell("Liq",PF.liquidations||0,(PF.liquidations||0)>0?'down':'')+
    `<div class="cell"><span class="lbl">Leverage</span><div class="v mono" style="color:var(--amber)">3×</div></div>`;
  document.getElementById("book").innerHTML=Object.entries(PF.pos).map(([a,p])=>{
    const L=p.units>0, info=valueOf(a,p), pnl=L?info.val-p.margin:0, pct=L?pnl/p.margin*100:0;
    return `<div class="trow ${L?'long':''}"><div><div class="sym">${short(a)}</div><div class="sub">${L?('entry '+fx(p.entry)+' · liq '+fx(p.liq)):'—'}</div></div>
      <div class="r mono">${info.price?'$'+fx(info.price):'—'}</div>
      <div class="r mono ${pnl>=0?'up':'down'}">${L?((pnl>=0?'+':'')+money(pnl)+'  '+(pct>=0?'+':'')+pct.toFixed(1)+'%'):'—'}</div>
      <div class="st ${L?'on':'off'}">${L?'LONG':'CASH'}</div></div>`; }).join("");
  const last=PF.history&&PF.history.length?PF.history[PF.history.length-1].t:null;
  document.getElementById("foot").textContent=(last?("daily snapshot "+last.replace("T"," ")+" UTC · "):"")+"live prices · paper account";
}

async function loadPF(){ try{ const r=await fetch("portfolio.json?t="+Date.now(),{cache:"no-store"}); if(r.ok) PF=await r.json(); }catch(e){} }

(async()=>{ buildTabs(); await loadPF(); await loadChart(); await livePrices(); renderPortfolio(); })();
setInterval(async()=>{ await livePrices(); renderPortfolio(); }, 9000);
setInterval(loadChart, 30000);
setInterval(loadPF, 120000);
</script>
</body>
</html>
